            * `small` - Small'
        share_type:
          $ref: '#/components/schemas/ShareTypeEnum'
        pages:
          type: array
          items:
            type: integer
      required:
      - order
      - type
    ButtonTextAlignmentEnum:
      enum:
      - left
      - center
      - right
      type: string
      description: '* `left` - Left

        * `center` - Center

        * `right` - Right'
    RatingElementUpdateElement:
      type: object
