components:
  schemas:
    PublicViewInfo:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/PublicField'
          readOnly: true
        view:
          allOf:
          - $ref: '#/components/schemas/PublicView'
          readOnly: true
      required:
      - fields
      - view
    TimelineViewFieldOptions:
      type: object
      properties:
        hidden:
          type: boolean
          description: Whether or not the field should be hidden in the card.
        order:
          type: integer
          maximum: 32767
          minimum: -32768
          description: The order that the field has in the view. Lower value is first.
    View:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        table_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        type:
          type: string
          readOnly: true
        table:
          $ref: '#/components/schemas/TableWithoutDataSync'
        filter_type:
          allOf:
          - $ref: '#/components/schemas/ConditionTypeEnum'
          description: 'Indicates whether all the rows should apply to all filters (AND) or to any filter (OR).


            * `AND` - And

            * `OR` - Or'
        filters:
          type: array
          items:
            $ref: '#/components/schemas/ViewFilter'
        filter_groups:
          type: array
          items:
            $ref: '#/components/schemas/ViewFilterGroup'
        sortings:
          type: array
          items:
            $ref: '#/components/schemas/ViewSort'
        group_bys:
          type: array
          items:
            $ref: '#/components/schemas/ViewGroupBy'
        decorations:
          type: array
          items:
            $ref: '#/components/schemas/ViewDecoration'
        default_row_values:
          type: array
          items:
            $ref: '#/components/schemas/ViewDefaultValue'
        filters_disabled:
          type: boolean
          description: Allows users to see results unfiltered while still keeping the filters saved for the view.
        public_view_has_password:
          type: boolean
          description: 'Indicates whether the public view is password protected or not.


            :return: True if the public view is password protected, False otherwise.'
          readOnly: true
        show_logo:
          type: boolean
        allow_public_export:
          type: boolean
          description: Indicates whether it's allowed to export a publicly shared view.
        ownership_type:
          type: string
        owned_by_id:
          type: integer
      required:
      - id
      - name
      - order
      - ownership_type
      - public_view_has_password
      - table
      - table_id
      - type
    PaginationSerializerLinkRowValue:
      type: object
      properties:
        count:
          type: integer
          description: The total amount of results.
        next:
          type: string
          format: uri
          nullable: true
          description: URL to the next page.
        previous:
          type: string
          format: uri
          nullable: true
          description: URL to the previous page.
        results:
          type: array
          items:
            $ref: '#/components/schemas/LinkRowValue'
      required:
      - count
      - next
      - previous
      - results
    PublicViewTable:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        database_id:
          type: integer
          readOnly: true
      required:
      - database_id
      - id
