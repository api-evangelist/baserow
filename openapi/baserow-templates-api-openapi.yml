        is_default:
          type: string
          readOnly: true
          description: Indicates if the template must be selected by default. The web-frontend automatically selects the first `is_default` template that it can find.
        open_application:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
