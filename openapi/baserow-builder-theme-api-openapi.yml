openapi: 3.0.3
info:
  title: Baserow API spec Admin Builder theme API
  version: 2.2.2
  description: 'For more information about our REST API, please visit [this page](https://baserow.io/docs/apis%2Frest-api).


    For more information about our deprecation policy, please visit [this page](https://baserow.io/docs/apis%2Fdeprecations).'
  contact:
    url: https://baserow.io/contact
  license:
    name: MIT
    url: https://github.com/baserow/baserow/blob/develop/LICENSE
tags:
- name: Builder theme
paths:
  /api/builder/{builder_id}/theme/:
    patch:
      operationId: update_builder_theme
      description: Updates the theme properties for the provided id.
      parameters:
      - in: header
        name: ClientSessionId
        schema:
          type: string
          format: uuid
        description: An optional header that marks the action performed by this request as having occurred in a particular client session. Then using the undo/redo endpoints with the same ClientSessionId header this action can be undone/redone.
      - in: path
        name: builder_id
        schema:
          type: integer
        description: Updates the theme for the application builder related to the provided value.
        required: true
      tags:
      - Builder theme
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedColorTypographyButtonImagePageInputTableLinklink_active_text_decoration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedColorTypographyButtonImagePageInputTableLinklink_active_text_decoration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedColorTypographyButtonImagePageInputTableLinklink_active_text_decoration'
      security:
      - UserSource JWT: []
      - JWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColorTypographyButtonImagePageInputTableLinklink_active_text_decoration'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_REQUEST_BODY_VALIDATION
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_APPLICATION_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
