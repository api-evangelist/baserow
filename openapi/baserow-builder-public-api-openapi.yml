openapi: 3.0.3
info:
  title: Baserow API spec Admin Builder public API
  version: 2.2.2
  description: 'For more information about our REST API, please visit [this page](https://baserow.io/docs/apis%2Frest-api).


    For more information about our deprecation policy, please visit [this page](https://baserow.io/docs/apis%2Fdeprecations).'
  contact:
    url: https://baserow.io/contact
  license:
    name: MIT
    url: https://github.com/baserow/baserow/blob/develop/LICENSE
tags:
- name: Builder public
paths:
  /api/builder/domains/published/by_id/{builder_id}/:
    get:
      operationId: get_public_builder_by_id
      description: Returns the public serialized version of the builder and its pages for the given builder id.
      parameters:
      - in: path
        name: builder_id
        schema:
          type: integer
        description: Returns the builder related to the provided Id and its pages.
        required: true
      tags:
      - Builder public
      security:
      - UserSource JWT: []
      - JWT: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/public_ApplicationApplication'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_BUILDER_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
  /api/builder/domains/published/by_name/{domain_name}/:
    get:
      operationId: get_public_builder_by_domain_name
      description: Returns the public serialized version of the builder for the given domain name and its pages .
      parameters:
      - in: path
        name: domain_name
        schema:
          type: string
        description: Returns the builder published for the given domain name.
        required: true
      tags:
      - Builder public
      security:
      - UserSource JWT: []
      - JWT: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/public_ApplicationApplication'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_BUILDER_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
  /api/custom_code/{builder_id}/css/:
    get:
      operationId: get_public_builder_custom_code
      description: Returns the css/js for the given builder.
      parameters:
      - in: path
        name: builder_id
        schema:
          type: integer
        description: The builder Id we want the custom code for.
        required: true
      - in: path
        name: type
        schema:
          type: string
          enum:
          - css
          - js
        description: 'Type of code to return: ''css'' or ''js'''
        required: true
      tags:
      - Builder public
      security:
      - UserSource JWT: []
      - JWT: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
          description: ''
        '404':
