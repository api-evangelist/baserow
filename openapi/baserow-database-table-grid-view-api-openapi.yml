          type: string
        description: if `include` is set to `total`, the total row count will be returned with the result.
      - in: query
        name: type
        schema:
          type: string
        description: 'The aggregation type you want. Available aggregation types: count, empty_count, not_empty_count, unique_count, min, max, sum, average, median, decile, variance, std_dev, distribution'
      - in: path
        name: view_id
        schema:
          type: integer
        description: Select the view you want the aggregation for.
        required: true
