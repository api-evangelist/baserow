      - bold
      - extra-bold
      - heavy
      - black
      - extra-black
      type: string
      description: '* `thin` - Thin

        * `extra-light` - Extra Light

        * `light` - Light

        * `regular` - Regular

        * `medium` - Medium

        * `semi-bold` - Semi Bold

        * `bold` - Bold

        * `extra-bold` - Extra Bold

        * `heavy` - Heavy

        * `black` - Black

        * `extra-black` - Extra Black'
    CustomCode:
      type: object
      properties:
        css:
          type: string
          description: Custom CSS code.
        js:
          type: string
          description: Custom JavaScript code.
    FileImportJobJob:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          type: string
          readOnly: true
          description: The type of the job.
        progress_percentage:
          type: integer
          description: A percentage indicating how far along the job is. 100 means that it's finished.
        state:
          type: string
          description: Indicates the state of the import job.
        human_readable_error:
          type: string
          description: A human readable error message indicating what went wrong.
        created_on:
          type: string
          format: date-time
          readOnly: true
        updated_on:
          type: string
          format: date-time
          readOnly: true
        database_id:
          type: integer
          description: Database id where the table will be created.
        name:
          type: string
          description: The name of the new table.
          maxLength: 255
        table_id:
          type: integer
          description: Table id where the data will be imported.
        first_row_header:
          type: boolean
          default: false
        importer_type:
          type: string
          default: ''
          description: The frontend importer identifier used to parse the file.
          maxLength: 32
        original_file_name:
          type: string
          default: ''
          description: The original name of the uploaded file.
          maxLength: 255
        report:
          allOf:
          - $ref: '#/components/schemas/Report'
          description: Import error report.
      required:
      - created_on
      - database_id
      - id
      - progress_percentage
      - report
      - state
      - type
      - updated_on
    GenerateAIValuesJobJob:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          type: string
          readOnly: true
          description: The type of the job.
        progress_percentage:
          type: integer
          description: A percentage indicating how far along the job is. 100 means that it's finished.
        state:
          type: string
          description: Indicates the state of the import job.
        human_readable_error:
          type: string
          description: A human readable error message indicating what went wrong.
        created_on:
          type: string
          format: date-time
          readOnly: true
        updated_on:
          type: string
          format: date-time
          readOnly: true
        field_id:
          type: integer
          description: The ID of the AI field to generate values for.
        row_ids:
          type: array
          items:
            type: integer
          description: The IDs of the rows to generate AI values for. If not provided, all rows in the view or table will be processed.
        view_id:
          type: integer
          description: The ID of the view to generate AI values for. If not provided, the entire table will be processed.
        only_empty:
          type: boolean
          description: Whether to only generate AI values for rows where the field is empty.
        is_auto_update:
          type: boolean
          readOnly: true
          description: Indicates if the job has been created because values in a dependent field changed.
      required:
      - created_on
      - field_id
      - id
      - is_auto_update
      - progress_percentage
      - state
      - type
      - updated_on
    Heading5TextAlignmentEnum:
      enum:
      - left
      - center
      - right
      type: string
      description: '* `left` - Left

        * `center` - Center

        * `right` - Right'
    DuplicateTableJobCreateJob:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/Type3edEnum'
          description: 'The type of the job.


            * `duplicate_application` - duplicate_application

            * `install_template` - install_template

            * `create_snapshot` - create_snapshot

            * `restore_snapshot` - restore_snapshot

            * `export_applications` - export_applications

            * `import_applications` - import_applications

            * `airtable` - airtable

