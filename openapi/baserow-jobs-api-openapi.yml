openapi: 3.0.3
info:
  title: Baserow API spec Admin Jobs API
  version: 2.2.2
  description: 'For more information about our REST API, please visit [this page](https://baserow.io/docs/apis%2Frest-api).


    For more information about our deprecation policy, please visit [this page](https://baserow.io/docs/apis%2Fdeprecations).'
  contact:
    url: https://baserow.io/contact
  license:
    name: MIT
    url: https://github.com/baserow/baserow/blob/develop/LICENSE
tags:
- name: Jobs
paths:
  /api/jobs/:
    get:
      operationId: list_job
      description: List all existing jobs. Jobs are task executed asynchronously in the background. You can use the `get_job` endpoint to read the current progress of the job. The available query parameters depend on the job type selected via the `type` parameter. Each job type may support additional type-specific filter parameters.
      parameters:
      - in: query
        name: generate_ai_values_field_id
        schema:
          type: integer
          minimum: 1
        description: '**[Only for type=''generate_ai_values'']** Filter by the AI field ID.'
      - in: query
        name: job_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
      - in: query
        name: states
        schema:
          type: string
          minLength: 1
      - in: query
        name: type
        schema:
          enum:
          - duplicate_application
          - install_template
          - create_snapshot
          - restore_snapshot
          - export_applications
          - import_applications
          - airtable
          - duplicate_table
          - duplicate_field
          - sync_data_sync_table
          - duplicate_page
          - publish_domain
          - duplicate_automation_workflow
          - publish_automation_workflow
          - generate_ai_values
          - audit_log_export
          - data_scan_result_export
          - file_import
          type: string
          minLength: 1
        description: 'The type of job to filter for. Determines which additional filter fields are available.


          * `duplicate_application` - duplicate_application

          * `install_template` - install_template

          * `create_snapshot` - create_snapshot

          * `restore_snapshot` - restore_snapshot

          * `export_applications` - export_applications

          * `import_applications` - import_applications

          * `airtable` - airtable

          * `duplicate_table` - duplicate_table

          * `duplicate_field` - duplicate_field

          * `sync_data_sync_table` - sync_data_sync_table

          * `duplicate_page` - duplicate_page

          * `publish_domain` - publish_domain

          * `duplicate_automation_workflow` - duplicate_automation_workflow

          * `publish_automation_workflow` - publish_automation_workflow

          * `generate_ai_values` - generate_ai_values

          * `audit_log_export` - audit_log_export

          * `data_scan_result_export` - data_scan_result_export

          * `file_import` - file_import'
      tags:
      - Jobs
      security:
      - UserSource JWT: []
      - JWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job_TypeJob'
          description: ''
    post:
      operationId: create_job
      description: Creates a new job. This job runs asynchronously in the background and execute the task specific to the provided typeparameters. The `get_job` can be used to get the current state of the job.
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Job_TypeCreateJob'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Job_TypeCreateJob'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Job_TypeCreateJob'
      security:
      - UserSource JWT: []
      - JWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job_TypeJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_USER_NOT_IN_GROUP
                    - ERROR_REQUEST_BODY_VALIDATION
                    - ERROR_MAX_JOB_COUNT_EXCEEDED
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_GROUP_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
  /api/jobs/{job_id}/:
    get:
      operationId: get_job
      description: Returns the information related to the provided job id. This endpoint can for example be polled to get the state and progress of the job in real time.
      parameters:
      - in: path
        name: job_id
        schema:
          type: integer
        description: The job id to lookup information about.
        required: true
      tags:
      - Jobs
      security:
      - UserSource JWT: []
      - JWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job_TypeJob'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_JOB_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
  /api/jobs/{job_id}/cancel/:
    post:
      operationId: cancel_job
      description: 'Cancels a job. Note: you can cancel only a scheduled or a job that is already running. The user requesting must be the owner of the job to cancel.'
      parameters:
      - in: path
        name: job_id
        schema:
          type: integer
        description: The job id to cancel.
        required: true
      tags:
      - Jobs
      security:
      - UserSource JWT: []
      - JWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job_TypeJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_JOB_NOT_CANCELLABLE
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_JOB_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
