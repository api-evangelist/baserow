openapi: 3.0.3
info:
  title: Baserow API spec Admin Database table view export API
  version: 2.2.2
  description: 'For more information about our REST API, please visit [this page](https://baserow.io/docs/apis%2Frest-api).


    For more information about our deprecation policy, please visit [this page](https://baserow.io/docs/apis%2Fdeprecations).'
  contact:
    url: https://baserow.io/contact
  license:
    name: MIT
    url: https://github.com/baserow/baserow/blob/develop/LICENSE
tags:
- name: Database table view export
paths:
  /api/database/view/{slug}/export-public-view/:
    post:
      operationId: export_publicly_shared_view
      description: 'Creates and starts a new export job for a publicly shared view  given some exporter options. Returns an error if the view doesn''t support exporting.


        This is a **premium** feature.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        description: Select the view you want to export.
        required: true
      tags:
      - Database table view export
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Export'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Export'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Export'
      security:
      - UserSource JWT: []
      - JWT: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_REQUEST_BODY_VALIDATION
                    - ERROR_TABLE_ONLY_EXPORT_UNSUPPORTED
                    - ERROR_VIEW_UNSUPPORTED_FOR_EXPORT_TYPE
                    - ERROR_VIEW_NOT_IN_TABLE
                    - ERROR_FILTER_FIELD_NOT_FOUND
                    - ERROR_VIEW_FILTER_TYPE_DOES_NOT_EXIST
                    - ERROR_VIEW_FILTER_TYPE_UNSUPPORTED_FIELD
                    - ERROR_ORDER_BY_FIELD_NOT_FOUND
                    - ERROR_ORDER_BY_FIELD_NOT_POSSIBLE
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_VIEW_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
  /api/database/view/get-public-view-export/{job_id}/:
    get:
      operationId: get_public_view_export_job
      description: 'Returns information such as export progress and state or the url of the exported file for the specified export job, only if the requesting user has access.


        This is a **premium** feature.'
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
        description: The signed job id to lookup information about.
        required: true
      tags:
      - Database table view export
      security:
      - UserSource JWT: []
      - JWT: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine readable error indicating what went wrong.
                    enum:
                    - ERROR_EXPORT_JOB_DOES_NOT_EXIST
                  detail:
                    oneOf:
                    - type: string
                      format: string
                      description: Human readable details about what went wrong.
                    - type: object
                      format: object
                      description: Machine readable object about what went wrong.
          description: ''
