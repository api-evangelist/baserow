    PatchedDecorator_Value_Provider_TypeUpdateViewDecoration:
      oneOf:
      - $ref: '#/components/schemas/GeneratedSingle_select_colorUpdateViewDecoration'
      - $ref: '#/components/schemas/GeneratedConditional_colorUpdateViewDecoration'
