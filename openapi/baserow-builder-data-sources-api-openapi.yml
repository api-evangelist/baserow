    CoreRouterServiceUpdateDataSource:
      type: object
      properties:
        integration_id:
          type: integer
          nullable: true
          description: The related integration id.
        name:
          type: string
        default_edge_label:
          type: string
          description: The label to apply next to router edge.
          maxLength: 75
        edges:
          type: array
          items:
            $ref: '#/components/schemas/CoreRouterServiceEdge'
          description: The edges associated with this service.
    DispatchDataSourceDataSourceContext:
      type: object
      properties:
        element:
          type: integer
          nullable: true
          description: Optionally provide an `element` to the data source. Currently only used in element-level filtering, sorting and searching if the element is a collection element.
    BodyTypeD6eEnum:
      enum:
      - plain
      - html
      type: string
      description: '* `plain` - Plain Text

        * `html` - HTML'
    LocalBaserowDeleteRowDataSource:
      type: object
      description: 'Basic data_source serializer mostly for returned values. This serializer flatten the

        service properties so that from an API POV the data_source object only exists.'
      properties:
        id:
          type: integer
          readOnly: true
          description: Data source id.
        integration_id:
          type: integer
          nullable: true
          description: The id of the Baserow integration we want the data for.
        type:
          type: string
          readOnly: true
          description: The type of the data source.
        schema:
          type: object
          additionalProperties: {}
          readOnly: true
