    name: Baserow REST API
    description: >
      The Baserow REST API provides full programmatic access to databases, tables,
      rows, fields, views, and workspaces. It supports token-based authentication
      with granular table-level permissions and includes an auto-generated OpenAPI
      specification for every database schema.
