aid: baserow
name: Baserow
description: >
  Baserow is an open-source no-code database platform that allows teams to build
  databases, automations, applications, and AI agents without writing code. It offers
  a REST API for programmatically managing workspaces, databases, tables, rows, fields,
  and views. The platform is available as a cloud-hosted service at baserow.io or as a
  self-hosted deployment via Docker, giving organizations full control over their data.
  Baserow is GDPR, HIPAA, and SOC 2 Type II compliant, and is trusted by over 150,000
  users as an open alternative to tools like Airtable.
