specification: API Commons Plans
specificationVersion: '0.1'
provider: Baserow
providerId: baserow
created: '2026-06-12'
modified: '2026-06-12'
reconciled: true
url: https://baserow.io/pricing
plans:
  - name: Free
    description: >
      Free tier for individuals and small projects. Includes unlimited databases
      and access to basic views. No credit card required.
    type: free
    price: 0
    currency: USD
    billingCycle: monthly
    quotas:
      - name: Rows per Workspace
        metric: rows
        limit: 3000
        timeFrame: workspace
        type: quota
      - name: Storage per Workspace
        metric: storage_gb
        limit: 2
        timeFrame: workspace
        type: quota
    features:
      - name: Unlimited Databases
        type: boolean
        value: true
      - name: Templates
        description: 65+ templates available
        type: boolean
        value: true
      - name: Grid View
        type: boolean
        value: true
      - name: Form View
        type: boolean
        value: true
      - name: Gallery View
        type: boolean
        value: true
      - name: Kanban View
        type: boolean
        value: false
      - name: Calendar View
        type: boolean
        value: false
      - name: Role Based Permissions
        type: boolean
        value: false
      - name: Audit Logs
        type: boolean
        value: false

  - name: Premium
    description: >
      For teams needing more capacity and advanced views. Includes Kanban, Survey,
      and Calendar views, plus XML/JSON/Excel export and row comments.
    type: paid
    price: 10
    currency: USD
    billingCycle: monthly
    billingNote: $10/user/month billed yearly; $12/user/month billed monthly
    quotas:
      - name: Rows per Workspace
        metric: rows
        limit: 50000
        timeFrame: workspace
        type: quota
      - name: Storage per Workspace
        metric: storage_gb
        limit: 20
        timeFrame: workspace
        type: quota
    features:
      - name: Unlimited Databases
        type: boolean
        value: true
      - name: Kanban View
        type: boolean
        value: true
      - name: Calendar View
        type: boolean
        value: true
      - name: Survey View
        type: boolean
        value: true
      - name: XML/JSON/Excel Export
        type: boolean
        value: true
      - name: Row Comments and Coloring
        type: boolean
        value: true
      - name: Role Based Permissions
        type: boolean
        value: false
      - name: Audit Logs
        type: boolean
        value: false

  - name: Advanced
    description: >
      For larger teams needing governance, compliance, and access control features.
      Includes role-based permissions, audit logs, extended row history, and free
      read/comment users.
    type: paid
    price: 18
    currency: USD
    billingCycle: monthly
    billingNote: $18/user/month billed yearly; $22/user/month billed monthly
    quotas:
      - name: Rows per Workspace
        metric: rows
        limit: 250000
        timeFrame: workspace
        type: quota
      - name: Storage per Workspace
        metric: storage_gb
        limit: 100
        timeFrame: workspace
        type: quota
      - name: Row History Retention
        metric: days
        limit: 180
        timeFrame: workspace
        type: quota
    features:
      - name: All Premium Features
        type: boolean
        value: true
      - name: Role Based Permissions
        type: boolean
        value: true
      - name: Free Read/Comment Users
        type: boolean
        value: true
      - name: Audit Logs
        type: boolean
        value: true
      - name: Extended Row History
        description: 180 days of row history
        type: boolean
        value: true

  - name: Enterprise
    description: >
      Maximum flexibility for large organizations with specific compliance and
      infrastructure requirements. Available for self-hosted deployments with
      custom pricing. Includes unlimited rows, API requests, and webhooks.
    type: enterprise
    price: 0
    currency: USD
    billingCycle: custom
    billingNote: Custom pricing based on organization needs; contact sales
    quotas:
      - name: Rows
        metric: rows
        limit: -1
        timeFrame: workspace
        type: quota
        note: Unlimited
      - name: API Requests
        metric: api_requests
        limit: -1
        timeFrame: workspace
        type: quota
        note: Unlimited on self-hosted
      - name: Webhooks
        metric: webhooks
        limit: -1
        timeFrame: workspace
        type: quota
        note: Unlimited on self-hosted
    features:
      - name: All Advanced Features
        type: boolean
        value: true
      - name: Self-Hosted Deployment
        type: boolean
        value: true
      - name: GDPR Compliance
        type: boolean
        value: true
      - name: HIPAA Compliance
        type: boolean
        value: true
      - name: SOC 2 Type II Compliance
        type: boolean
        value: true
      - name: Custom SLA
        type: boolean
        value: true
